sources:
  datasf-building-permits:
    type: socrata_building_permits
    domain: data.sfgov.org
    dataset_id: i98e-djp9
    contacts_dataset_id: 3pee-9qhc
    name: DataSF Building Permits
    jurisdiction: San Francisco
    county: San Francisco
    access: api
    date_field: data_loaded_at
    page_size: 500
    source_url_template: "https://data.sfgov.org/resource/i98e-djp9.json?permit_number={permit_number}"
    # DataSF columns match SocrataFieldMap defaults; contacts come from the join above.

  # Marin County (Socrata). County-level dataset: the contractor + license live on
  # the permit record itself (no contacts dataset), so path B (CSLB / website) applies.
  marin-building-permits:
    type: socrata_building_permits
    domain: data.marincounty.gov
    dataset_id: mkbn-caye
    name: Marin County Building Permits
    jurisdiction: Marin County
    county: Marin
    access: api
    # issued_date is often null (not-yet-issued); this column is always populated.
    date_field: most_recent_issued_received_date
    page_size: 500
    source_url_template: "https://data.marincounty.gov/resource/mkbn-caye.json?permit_number={permit_number}"
    field_map:
      record_id: unique_id
      permit_number: permit_number
      description: [description, construction, type_permit]
      address: [address]
      project_date: [issued_date, received_date]
      city: city_town
      company_name: contractor
      company_license: contractor_license

  # ArcGIS FeatureServer example (config-only; the generic adapter handles it).
  # DISABLED: Campbell has no contractor field — `ProjectName` is the property
  # owner/applicant (mostly homeowner surnames / owner LLCs), so it fails the
  # contact hard-requirement (like Sonoma). Kept here as a template: drop in a
  # different ArcGIS city that DOES expose a contractor/applicant company field.
  # campbell-building-permits:
  #   type: arcgis_building_permits
  #   name: Campbell Building Permits
  #   jurisdiction: Campbell
  #   county: Santa Clara
  #   access: api
  #   arcgis_service_url: https://services7.arcgis.com/RDyUffIeciKdYmX2/arcgis/rest/services/CampbellPermits_ActiveBuilding/FeatureServer
  #   arcgis_layer: 0
  #   date_field: IssuedDate
  #   page_size: 2000
  #   field_map:
  #     record_id: PermitID
  #     permit_number: ApplicationNumber
  #     description: [ProjectDescription, WorkType]
  #     address: [Address]
  #     project_date: [IssuedDate]
  #     city: City
  #     company_name: ProjectName

  # Path A: RFPs carry an issuing-agency point of contact (name/email/phone).
  # Requires a free SAM_API_KEY (set in .env). Opt in with: --source samgov-construction
  samgov-construction:
    type: samgov_opportunities
    name: SAM.gov Construction Opportunities
    jurisdiction: California
    county: Bay Area
    access: api
    page_size: 100
    # Client-side place-of-performance filter (the SAM API geo params are unreliable).
    # "bay_area" keeps the nine counties (city list + clean ZIP ranges, guarded by CA);
    # use a two-letter code like "CA" for state-wide instead.
    region: bay_area
    naics_codes:
      - "236220"  # Commercial and Institutional Building Construction
      - "237310"  # Highway, Street, and Bridge Construction

  # San Jose-centered SAM.gov RFPs. Use this instead of DataSF when the desired
  # geography is "within about 50 miles of San Jose" rather than San Francisco
  # building permits. Requires SAM_API_KEY in .env.
  samgov-construction-sanjose-50mi:
    type: samgov_opportunities
    name: SAM.gov Construction Opportunities - San Jose 50mi
    jurisdiction: San Jose
    county: San Jose 50mi
    access: api
    # Use the likely 10-request daily quota efficiently without broadening the
    # industry scope: 2 NAICS codes * 5 pages = up to 10 requests/day, and each
    # request asks for SAM.gov's max page size.
    page_size: 1000
    max_pages: 5
    region: san_jose_50mi
    naics_codes:
      - "236220"  # Commercial and Institutional Building Construction
      - "237310"  # Highway, Street, and Bridge Construction

  sanjose-active-building-permits:
    type: ckan_datastore
    name: San Jose Active Building Permits
    jurisdiction: San Jose
    county: Santa Clara
    access: api
    search_url: https://data.sanjoseca.gov/api/3/action/datastore_search
    record_path: result.records
    query_params:
      resource_id: 761b7ae8-3be1-4ad6-923d-c7af6404a904
    limit_param: limit
    offset_param: offset
    page_size: 5000
    source_url_template: https://data.sanjoseca.gov/dataset/active-building-permits/resource/761b7ae8-3be1-4ad6-923d-c7af6404a904
    date_field: ISSUEDATE
    field_map:
      record_id: FOLDERRSN
      permit_number: FOLDERNUMBER
      description: [WORKDESCRIPTION, FOLDERDESC, FOLDERNAME, SUBTYPEDESCRIPTION]
      address: [gx_location]
      project_date: [ISSUEDATE]
      company_name: CONTRACTOR

  sunnyvale-energov-permits:
    type: energov_building_permits
    name: Sunnyvale EnerGov Permits
    jurisdiction: Sunnyvale
    county: Santa Clara
    access: api
    search_url: https://sunnyvaleca-energovpub.tylerhost.net/apps/selfservice/api/energov/search/search
    criteria_url: https://sunnyvaleca-energovpub.tylerhost.net/apps/selfservice/api/energov/search/criteria
    source_url_template: https://sunnyvaleca-energovpub.tylerhost.net/apps/selfservice#/permit/{CaseId}
    record_path: Result.EntityResults
    request_headers:
      tenantId: "1"
      Tyler-TenantUrl: ""
    page_size: 100
    date_field: ApplyDate
    field_map:
      record_id: CaseId
      permit_number: CaseNumber
      description: [Description, CaseType]
      address: [AddressDisplay]
      project_date: [IssueDate, ApplyDate]

  # Accela / EnerGov portal adapters are config-driven because each city deploys
  # different public endpoints and field names. Keep these commented until the
  # live endpoint is verified in the browser/network tab; then copy one block,
  # fill search_url/field_map, and run `projectintel fetch --source <name>`.
  #
  # san-jose-accela-permits:
  #   type: accela_building_permits
  #   name: San Jose Accela Building Permits
  #   jurisdiction: San Jose
  #   county: Santa Clara
  #   access: api
  #   search_url: https://permits.example.gov/api/records/search
  #   detail_url_template: https://permits.example.gov/records/{recordNumber}
  #   record_path: result.records
  #   since_param: openedAfter
  #   limit_param: limit
  #   offset_param: offset
  #   page_size: 100
  #   field_map:
  #     record_id: recordId
  #     permit_number: recordNumber
  #     description: [description, recordType]
  #     address: [address]
  #     project_date: [openedDate, issuedDate]
  #     company_name: contractorName
  #     company_license: contractorLicense
  #     company_email: contractorEmail
  #     company_phone: contractorPhone
  #
  # sunnyvale-energov-permits:
  #   type: energov_building_permits
  #   name: Sunnyvale EnerGov Building Permits
  #   jurisdiction: Sunnyvale
  #   county: Santa Clara
  #   access: api
  #   search_url: https://energov.example.gov/selfservice/api/permits/search
  #   detail_url_template: https://energov.example.gov/selfservice#/permit/{permitNumber}
  #   record_path: data
  #   since_param: issuedAfter
  #   limit_param: take
  #   page_param: page
  #   page_size: 50
  #   field_map:
  #     record_id: permitId
  #     permit_number: permitNumber
  #     description: [workDescription, permitType]
  #     address: [siteAddress]
  #     project_date: [issueDate, applicationDate]
  #     company_name: contractorCompany
  #     company_license: contractorLicense
  #     company_email: contractorEmail
  #     company_phone: contractorPhone
